<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md. Nasir Uddin - Premium Design Portfolio</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
}
header{
    background:#111;
    color:#fff;
    padding:20px;
}
header h1{
    margin:0;
}
.admin-btn{
    background:#ff5722;
    color:#fff;
    padding:8px 15px;
    text-decoration:none;
    border-radius:5px;
}
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    margin:20px;
}
.card{
    background:#fff;
    width:250px;
    margin:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.card img{
    width:100%;
    border-radius:8px;
}
button{
    background:#007bff;
    color:white;
    padding:8px 15px;
    border:none;
    margin-top:10px;
    cursor:pointer;
    border-radius:5px;
}
input{
    padding:6px;
    margin-top:5px;
    width:90%;
}
#adminPanel{
    display:none;
    background:#fff;
    padding:20px;
    margin:20px;
    border-radius:10px;
}
</style>
</head>
<body>

<header>
<h1>Md. Nasir Uddin</h1>
<p>Premium Graphic Design Collection</p>
<button class="admin-btn" onclick="toggleAdmin()">Admin Panel</button>
</header>

<section class="gallery" id="gallery"></section>

<div id="adminPanel">
<h2>Admin Dashboard</h2>

<h3>Add New Design</h3>
<input type="text" id="title" placeholder="Design Title"><br>
<input type="text" id="image" placeholder="Image URL"><br>
<input type="text" id="file" placeholder="Download File URL"><br>
<button onclick="addDesign()">Add Design</button>

<h3>Download Requests</h3>
<div id="requests"></div>
</div>

<script>
let designs = JSON.parse(localStorage.getItem("designs")) || [];
let requests = JSON.parse(localStorage.getItem("requests")) || [];

function saveData(){
localStorage.setItem("designs", JSON.stringify(designs));
localStorage.setItem("requests", JSON.stringify(requests));
}

function loadGallery(){
const gallery = document.getElementById("gallery");
gallery.innerHTML="";
designs.forEach((design,index)=>{
gallery.innerHTML += `
<div class="card">
<img src="${design.image}">
<h3>${design.title}</h3>
<input type="text" placeholder="Your Name" id="name${index}">
<button onclick="requestDownload(${index})">Request Download</button>
</div>
`;
});
}

function addDesign(){
const title=document.getElementById("title").value;
const image=document.getElementById("image").value;
const file=document.getElementById("file").value;

if(title===""||image===""||file===""){
alert("All fields required!");
return;
}

designs.push({title,image,file});
saveData();
loadGallery();
alert("Design Added Successfully!");
}

function requestDownload(index){
const name=document.getElementById("name"+index).value;

if(name===""){
alert("Enter Your Name");
return;
}

requests.push({
design:index,
user:name,
status:"pending"
});
saveData();
alert("Request Sent! Wait for Admin Approval.");
loadRequests();
}

function loadRequests(){
const reqDiv=document.getElementById("requests");
reqDiv.innerHTML="";
requests.forEach((req,i)=>{
reqDiv.innerHTML += `
<p>
${req.user} - ${req.status}
${req.status==="pending"?
`<button onclick="approve(${i})">Approve</button>`:""}
${req.status==="approved"?
`<button onclick="downloadFile(${i})">Download</button>`:""}
</p>
`;
});
}

function approve(i){
requests[i].status="approved";
saveData();
loadRequests();
alert("Request Approved!");
}

function downloadFile(i){
const designIndex=requests[i].design;
window.open(designs[designIndex].file,"_blank");
}

function toggleAdmin(){
const panel=document.getElementById("adminPanel");
panel.style.display = panel.style.display==="none" ? "block" : "none";
loadRequests();
}

loadGallery();
</script>

</body>
</html>
